services:
  # Backend API Service
  - type: web
    name: bob-onboarding-api
    runtime: python
    plan: free
    rootDir: bob-onboarding
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BOB_API_ENDPOINT
        sync: false
      - key: BOB_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health

# Made with Bob
