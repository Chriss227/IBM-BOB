apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bob-onboarding-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
  - hosts:
    - bob-onboarding.com
    - api.bob-onboarding.com
    secretName: bob-onboarding-tls
  rules:
  - host: api.bob-onboarding.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bob-onboarding-backend
            port:
              number: 8000
---
apiVersion: v1
kind: Secret
metadata:
  name: bob-secrets
type: Opaque
stringData:
  api-endpoint: "REPLACE_WITH_BOB_API_ENDPOINT"
  api-key: "REPLACE_WITH_BOB_API_KEY"

